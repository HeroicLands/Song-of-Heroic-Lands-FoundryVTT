# Folder hierarchy for the "items" compendium.
#
# Each entry declares one folder:
#   name            (required) display name
#   id              (required) stable 16-char Foundry ID
#   parentFolderId  (required) id of the parent folder, or "" for top-level
#   color           (optional) folder color (CSS hex)
#
# Sibling folders (same parentFolderId) must have unique names. Cousins
# (different parents) may share a name; vault frontmatter references the
# specific folder's id, so name collisions across the tree are fine.
#
# Vault notes link to folders via `sohl.folder: <id>` in frontmatter,
# where <id> is the target folder's id from this file. Unknown ids fail
# the export loudly.
