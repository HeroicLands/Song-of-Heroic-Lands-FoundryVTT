# Folder hierarchy for the "journals" compendium.
#
# Each entry declares one folder:
#   name            (required) display name
#   id              (required) stable 16-char Foundry ID
#   parentFolderId  (required) id of the parent folder, or "" for top-level
#   color           (optional) folder color (CSS hex)
#
# Sibling folders (same parentFolderId) must have unique names.
#
# Vault notes link to folders via `sohl.folder: <id>` in frontmatter,
# where <id> is the target folder's id from this file. Unknown ids fail
# the compile loudly.

- name: Rules
  id: RqKUTBUBN2Y3MHYB
  parentFolderId: ""
  color: "#d35400"
- name: User Guide
  id: IgwaG8rAUUO9vrtz
  parentFolderId: ""
  color: "#0000ff"
- name: Actors
  id: sYK1BozT9xFcinXK
  parentFolderId: IgwaG8rAUUO9vrtz
- name: Items
  id: QtOgPodi8X6gDWL0
  parentFolderId: IgwaG8rAUUO9vrtz
