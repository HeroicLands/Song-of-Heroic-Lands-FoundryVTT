# Folder hierarchy for the "macros" compendium.
#
# Each entry declares one folder:
#   name            (required) display name; must not contain "/"
#   id              (required) stable 16-char Foundry ID
#   parentFolderId  (required) id of the parent folder, or "" for top-level
#   color           (optional) folder color (CSS hex)
#
# Sibling folders (same parentFolderId) must have unique names. Cousins
# (different parents) may share a name; vault frontmatter disambiguates
# them with paths like "Possessions/Misc" vs "Afflictions/Misc".
#
# Vault notes link to folders via `sohl.folder: <path>` in frontmatter,
# where <path> is a slash-separated path of folder names from the root.
# Unresolved paths fail the export loudly.
[]
