name: Feature
description: A new capability or enhancement that does not exist yet, shippable as one unit of value.
title: ""
type: Feature
labels: []
body:
    - type: markdown
      attributes:
          value: |
              A **feature** is _missing_ capability (something _broken_ is a **Bug**; work needing many sub-issues is an **Epic**). See the [issue-reporting standard](https://github.com/HeroicLands/Song-of-Heroic-Lands-FoundryVTT/blob/main/docs/how-to/issue-reporting.md).
    - type: textarea
      id: motivation
      attributes:
          label: Problem / motivation
          description: What need or gap this addresses.
      validations:
          required: true
    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: What to build. Sketch the approach if known.
      validations:
          required: true
    - type: textarea
      id: acceptance
      attributes:
          label: Acceptance criteria
          description: Observable conditions that mean this is done.
      validations:
          required: true
    - type: dropdown
      id: priority
      attributes:
          label: Priority (proposed)
          description: Set on the project board; this is your proposal. Default Medium; justify anything higher in the body.
          options: [Urgent, High, Medium, Low]
          default: 2
      validations:
          required: true
    - type: dropdown
      id: labels
      attributes:
          label: Labels (proposed)
          description: Categorization only, from the registry. A maintainer applies them.
          multiple: true
          options:
              - system
              - documentation
              - content
              - thalorna
              - site
              - devops
              - tests
              - security
              - tech-debt
              - breaking-change
