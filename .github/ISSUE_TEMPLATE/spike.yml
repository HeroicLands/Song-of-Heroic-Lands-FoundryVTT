name: Spike
description: A timeboxed investigation whose deliverable is a decision, answer, or recommendation — not shipped code.
type: Spike
body:
    - type: markdown
      attributes:
          value: |
              A **spike** answers a question whose outcome is genuinely uncertain; it produces a _conclusion_, not production code, and typically spawns follow-up issues. If the steps are already known, it's a **Task**. See the [issue-reporting standard](https://github.com/HeroicLands/Song-of-Heroic-Lands-FoundryVTT/blob/main/docs/how-to/issue-reporting.md).
    - type: textarea
      id: question
      attributes:
          label: Question
          description: The specific thing we need to decide or learn.
      validations:
          required: true
    - type: input
      id: timebox
      attributes:
          label: Timebox
          description: e.g. 1 day / 4 hours. Required.
      validations:
          required: true
    - type: textarea
      id: deliverable
      attributes:
          label: Deliverable
          description: The form of the answer — a decision, recommendation, written finding, or throwaway prototype. NOT production code.
      validations:
          required: true
    - type: textarea
      id: follow-up
      attributes:
          label: Follow-up
          description: Note that follow-up feature/task/bug issues will be filed from the outcome.
      validations:
          required: false
