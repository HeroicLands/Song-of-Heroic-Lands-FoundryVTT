name: Version and Release

on:
    push:
        branches:
            - main

# contents: write   -> create the release, tag, and version commit
# pull-requests: write -> open/update the "Version Packages" PR
# id-token: write    -> OIDC for npm Trusted Publishing (@heroiclands/sohl-types)
permissions:
    contents: write
    pull-requests: write
    id-token: write

# Never let two pushes to main race on the version PR or the release.
concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Version and Release
        runs-on: ubuntu-latest

        # Surface the release decision so the downstream docs-publish job can
        # gate on it and receive the tag.
        outputs:
            release: ${{ steps.decide.outputs.release }}
            tag: ${{ steps.decide.outputs.tag }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # When changesets are pending, this opens (or updates) the
            # "Version Packages" PR that bumps the version and rewrites
            # CHANGELOG.md. When that PR is merged, the changesets are gone, so
            # this step is a no-op and `hasChangesets` is false — which is the
            # signal that a freshly-versioned commit just landed on main.
            - name: Create or update the Version Packages PR
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npx changeset version
                  commit: "chore(release): version packages"
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Release only when the Version PR has merged: no changesets remain
            # AND the current package version has not already been tagged. This
            # makes the job idempotent — ordinary pushes to main never release.
            - name: Decide whether to release
              id: decide
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v$VERSION"
                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                      echo "Tag $TAG already exists — nothing to release."
                      echo "release=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "Version $VERSION is untagged — releasing $TAG."
                      echo "release=true" >> "$GITHUB_OUTPUT"
                      echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build system
              if: steps.decide.outputs.release == 'true'
              run: npm run build

            - name: Package system
              if: steps.decide.outputs.release == 'true'
              run: npm run build:pack-release

            - name: Read changelog section for this version
              id: changelog
              if: steps.decide.outputs.release == 'true'
              run: |
                  {
                    echo 'body<<EOF'
                    # Emit only the latest version's section: everything between
                    # the first "## " heading and the next "## " heading,
                    # excluding the version header line itself (the release title
                    # already shows it).
                    awk '/^## /{c++; if (c>=2) exit; next} c==1{print}' CHANGELOG.md
                    echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            # Creates the v<version> tag and the GitHub Release, attaching the
            # packaged manifest + zip that Foundry installs from.
            - name: Create GitHub Release
              if: steps.decide.outputs.release == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.decide.outputs.tag }}
                  name: Release ${{ steps.decide.outputs.tag }}
                  body: ${{ steps.changelog.outputs.body }}
                  files: |
                      build/dist/system.zip
                      build/dist/system.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Publish the types-only npm package via npm Trusted Publishing
            # (OIDC) — no NPM_TOKEN. Requires a Trusted Publisher configured on
            # npm for @heroiclands/sohl-types pointing at this repo + this
            # workflow file, plus the `id-token: write` permission above.
            # Idempotent: skips when the package's version is already on npm. The
            # types package is versioned by hand in
            # packages/sohl-types/package.json (independent of the system
            # version); its `prepack` regenerates index.d.ts from source at pack
            # time. npm >= 11.5 is required for OIDC, so upgrade the runner's npm.
            - name: Publish @heroiclands/sohl-types (npm Trusted Publishing)
              if: steps.decide.outputs.release == 'true'
              run: |
                  npm install -g npm@latest
                  cd packages/sohl-types
                  VERSION=$(node -p "require('./package.json').version")
                  if npm view "@heroiclands/sohl-types@$VERSION" version >/dev/null 2>&1; then
                      echo "@heroiclands/sohl-types@$VERSION already published — skipping."
                  else
                      npm publish
                  fi

            # Versioned API docs are published by the `publish-docs` job below,
            # not a step here — see its comment for why.

    # Publish the freshly-tagged release's API docs under /<tag> and mirror
    # /latest. The Release above is created with GITHUB_TOKEN, which by design
    # cannot trigger deploy-docs.yml's `release:` event, so we call it via
    # `workflow_call` in this same run instead — unaffected by that no-cascade
    # rule and needing no PAT. Skipped on ordinary pushes to main (no release),
    # since `release` is then empty.
    #
    # Manual fallback if this job is ever removed or fails:
    #   gh workflow run deploy-docs.yml --ref v<version>   (publishes /<tag> + /latest)
    publish-docs:
        name: Publish versioned API docs
        needs: release
        if: needs.release.outputs.release == 'true'
        permissions:
            contents: write
        uses: ./.github/workflows/deploy-docs.yml
        with:
            target_dir: ${{ needs.release.outputs.tag }}
            is_release: true
        secrets: inherit
